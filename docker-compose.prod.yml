services:
  web:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY_OWNER:-scrymechat}/${REPO_NAME:-workspace}/web:${APP_VERSION:-latest}
    container_name: scrymechat-web
    restart: always
    expose:
      - '3001'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-main}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
    networks:
      - scrymechat-network
      - dokploy-network

  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY_OWNER:-scrymechat}/${REPO_NAME:-workspace}/api:${APP_VERSION:-latest}
    container_name: scrymechat-api
    restart: always
    expose:
      - '3000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-main}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
    networks:
      - scrymechat-network
      - dokploy-network

  postgres:
    image: postgres:17-alpine
    container_name: scrymechat-postgres
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-main}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-main}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrymechat-network

  redis:
    image: redis:7-alpine
    container_name: scrymechat-redis
    restart: always
    volumes:
      - redis_data:/data
    env_file:
      - .env
    command: >
      sh -c "
        if [ -n \"$REDIS_PASSWORD\" ]; then
          exec redis-server --requirepass \"$REDIS_PASSWORD\"
        else
          exec redis-server
        fi
      "
    healthcheck:
      test: >
        sh -c "
          if [ -n \"$REDIS_PASSWORD\" ]; then
            redis-cli -a \"$REDIS_PASSWORD\" ping
          else
            redis-cli ping
          fi
        "
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrymechat-network

volumes:
  db_data:
  redis_data:

networks:
  scrymechat-network:
    name: scrymechat-network
    driver: bridge
    attachable: true
  dokploy-network:
    external: true
