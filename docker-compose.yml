services:
  postgres:
    image: postgres:17-alpine
    container_name: scrymechat-workspace-postgres
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-main}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-main}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrymechat-network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: scrymechat-rustfs
    restart: always
    ports:
      - '9000:9000'
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
    volumes:
      - rustfs_data:/data
    networks:
      - scrymechat-network

  redis:
    image: redis:7-alpine
    container_name: scrymechat-workspace-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: >
      sh -c "
        if [ -n \"$REDIS_PASSWORD\" ]; then
          exec redis-server --requirepass \"$REDIS_PASSWORD\"
        else
          exec redis-server
        fi
      "
    healthcheck:
      test: >
        sh -c "
          if [ -n \"$REDIS_PASSWORD\" ]; then
            redis-cli -a \"$REDIS_PASSWORD\" ping
          else
            redis-cli ping
          fi
        "
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrymechat-network

volumes:
  db_data:
  redis_data:
  rustfs_data:

networks:
  scrymechat-network:
    driver: bridge
