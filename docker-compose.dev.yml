version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: scryme-chat-pg
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-main}
    ports:
      - '54321:5432' # Changed container port to 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: scryme-chat-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - '6479:6379' # Changed container port to 6379
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
