name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

env:
  PG_U: runner_u
  PG_P: runner_p
  PG_D_UNIT: db_unit
  PG_D_E2E: db_e2e
  RD_PORT: 6379

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - run: pnpm run lint
      - run: pnpm run tsc

  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.PG_U }}
          POSTGRES_PASSWORD: ${{ env.PG_P }}
          POSTGRES_DB: ${{ env.PG_D_UNIT }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Run Tests
        env:
          DATABASE_URL: postgresql://${{ env.PG_U }}:${{ env.PG_P }}@localhost:5432/${{ env.PG_D_UNIT }}?schema=public
          REDIS_URL: redis://localhost:${{ env.RD_PORT }}
          BETTER_AUTH_SECRET: dummy_secret_for_build_purposes_only_32_chars
        run: pnpm run test

  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.PG_U }}
          POSTGRES_PASSWORD: ${{ env.PG_P }}
          POSTGRES_DB: ${{ env.PG_D_E2E }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'
    - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
    - name: Run Prisma Generate
      run: pnpm --filter @repo/database run db:generate
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Run Playwright tests
      env:
        DATABASE_URL: postgresql://${{ env.PG_U }}:${{ env.PG_P }}@localhost:5432/${{ env.PG_D_E2E }}?schema=public
        REDIS_URL: redis://localhost:${{ env.RD_PORT }}
        BETTER_AUTH_SECRET: dummy_secret_for_build_purposes_only_32_chars
        PORT: 3001
      run: pnpm run test:e2e
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, e2e-tests]
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version:ci
          publish: npx changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mobile-build-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'

      - name: Setup Java
        if: steps.filter.outputs.mobile == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node
        if: steps.filter.outputs.mobile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        if: steps.filter.outputs.mobile == 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.filter.outputs.mobile == 'true'
        run: pnpm install --dangerously-allow-all-builds

      - name: Generate Prisma Client
        if: steps.filter.outputs.mobile == 'true'
        run: pnpm --filter @repo/database run db:generate

      - name: Build Shared Packages
        if: steps.filter.outputs.mobile == 'true'
        run: |
          pnpm --filter @repo/shared build
          pnpm --filter @repo/api-client build

      - name: Setup Android SDK
        if: steps.filter.outputs.mobile == 'true'
        uses: android-actions/setup-android@v3

      - name: Prebuild Android
        if: steps.filter.outputs.mobile == 'true'
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: https://api.skryme.com
        run: npx expo prebuild --platform android

      - name: Build Debug APK
        if: steps.filter.outputs.mobile == 'true'
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

  desktop-build-verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            desktop:
              - 'apps/desktop/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'

      - name: Setup Node
        if: steps.filter.outputs.desktop == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        if: steps.filter.outputs.desktop == 'true'
        uses: pnpm/action-setup@v4

      - name: Install Rust
        if: steps.filter.outputs.desktop == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        if: steps.filter.outputs.desktop == 'true'
        run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds

      - name: Generate Prisma Client
        if: steps.filter.outputs.desktop == 'true'
        run: pnpm --filter @repo/database run db:generate

      - name: Build Shared Packages
        if: steps.filter.outputs.desktop == 'true'
        run: |
          pnpm --filter @repo/shared build
          pnpm --filter @repo/api-client build

      - name: Build Desktop App (Windows)
        if: steps.filter.outputs.desktop == 'true'
        run: pnpm --filter skryme-desktop run build

  docker-build-verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - 'apps/${{ matrix.app }}/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.dockerignore'
              - 'package.json'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.filter.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  docker-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [version, mobile-build-verify, desktop-build-verify, docker-build-verify]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./apps/${{ matrix.app }}/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Lowercase repo name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/$REPO_LOWER/${{ matrix.app }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
