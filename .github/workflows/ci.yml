name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  PG_U: runner_u
  PG_P: runner_p
  PG_D_UNIT: db_unit
  PG_D_E2E: db_e2e
  RD_PORT: 6379

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      web: ${{ steps.filter.outputs.web }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'apps/android/**'
            web:
              - 'apps/web/**'
            desktop:
              - 'apps/desktop/**'

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - run: pnpm run lint
      - run: pnpm run tsc

  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: runner_u
          POSTGRES_PASSWORD: runner_p
          POSTGRES_DB: db_unit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Run Tests
        env:
          DATABASE_URL: postgresql://${{ env.PG_U }}:${{ env.PG_P }}@localhost:5432/${{ env.PG_D_UNIT }}?schema=public
          REDIS_URL: redis://localhost:${{ env.RD_PORT }}
          BETTER_AUTH_SECRET: dummy_auth_val_ci_long_enough_for_better_auth
        run: pnpm run test

  api-e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: runner_u
          POSTGRES_PASSWORD: runner_p
          POSTGRES_DB: db_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Run API E2E tests
        env:
          DATABASE_URL: postgresql://${{ env.PG_U }}:${{ env.PG_P }}@localhost:5432/${{ env.PG_D_E2E }}?schema=public
          REDIS_URL: redis://localhost:${{ env.RD_PORT }}
          BETTER_AUTH_SECRET: dummy_auth_val_ci_long_enough_for_better_auth
        run: pnpm turbo run test:e2e --filter=api

  web-e2e:
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: runner_u
          POSTGRES_PASSWORD: runner_p
          POSTGRES_DB: db_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Web E2E tests
        env:
          DATABASE_URL: postgresql://${{ env.PG_U }}:${{ env.PG_P }}@localhost:5432/${{ env.PG_D_E2E }}?schema=public
          REDIS_URL: redis://localhost:${{ env.RD_PORT }}
          BETTER_AUTH_SECRET: dummy_auth_val_ci_long_enough_for_better_auth
          PORT: 3001
        run: pnpm turbo run test:e2e --filter=web
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-web
          path: apps/web/playwright-report/
          retention-days: 30

  native-android-test:
    needs: [changes]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew
      - name: Run Tests
        env:
          API_URL: http://localhost:3000
        run: cd apps/android && ./gradlew test

  desktop-verify:
    needs: [changes]
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Build Shared Packages
        run: |
          pnpm --filter @repo/shared build || true
          pnpm --filter @repo/api-client build || true
      - name: Update Version
        run: node scripts/update-version.js
      - name: Cargo Check
        run: cargo check
        working-directory: apps/desktop/src-tauri
      - name: Cargo Clippy
        run: cargo clippy -- -D warnings
        working-directory: apps/desktop/src-tauri
      - name: Cargo Fmt
        run: cargo fmt --all -- --check
        working-directory: apps/desktop/src-tauri

  all-tests-passed:
    needs: [lint-and-typecheck, unit-tests, api-e2e, web-e2e, native-android-test, desktop-verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          lint="${{ needs.lint-and-typecheck.result }}"
          unit="${{ needs.unit-tests.result }}"
          api="${{ needs.api-e2e.result }}"
          web="${{ needs.web-e2e.result }}"
          android="${{ needs.native-android-test.result }}"
          desktop="${{ needs.desktop-verify.result }}"

          if [[ "$lint" != "success" ]]; then exit 1; fi
          if [[ "$unit" != "success" ]]; then exit 1; fi
          if [[ "$api" != "success" ]]; then exit 1; fi
          if [[ "$web" != "success" && "$web" != "skipped" ]]; then exit 1; fi
          if [[ "$android" != "success" && "$android" != "skipped" ]]; then exit 1; fi
          if [[ "$desktop" != "success" && "$desktop" != "skipped" ]]; then exit 1; fi

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [changes, all-tests-passed]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    outputs:
      published: ${{ steps.versioning.outputs.published }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds

      - name: Git Configuration
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Handle Changeset Release Mode
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/dev" ]]; then
            if [ ! -f .changeset/pre.json ]; then
              pnpm changeset pre enter dev
            fi
          elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            if [ -f .changeset/pre.json ]; then
              pnpm changeset pre exit
            fi

            # Ensure pushing/merging to main produces a major release
            existing=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' 2>/dev/null)
            if [ -n "$existing" ]; then
              echo "Promoting existing changesets to major release for main..."
              sed -i 's/: patch/: major/g' .changeset/*.md 2>/dev/null || true
              sed -i 's/: minor/: major/g' .changeset/*.md 2>/dev/null || true
            else
              echo "No changeset found on main; generating automatic major changeset."
              PKG_NAME=$(node -p "require('./package.json').name || 'root'")
              printf -- "---\n\"%s\": major\n---\n\nAutomated major release triggered on push to main.\n" "$PKG_NAME" > ".changeset/auto-major-$(date +%s).md"
            fi
          fi

      - name: Auto-changeset for Android-only prerelease (dev)
        if: github.ref == 'refs/heads/dev' && needs.changes.outputs.android == 'true'
        run: |
          existing=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' 2>/dev/null)
          if [ -z "$existing" ]; then
            echo "No changeset found for this push; generating an automatic patch changeset for the android package."
            printf -- "---\n\"android\": patch\n---\n\nAutomated prerelease version bump triggered by Android app changes.\n" > ".changeset/auto-android-$(date +%s).md"
          else
            echo "Changeset(s) already present, skipping auto-generation."
          fi

      - name: Version and Commit
        id: versioning
        run: |
          pnpm version:auto
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "chore: release [skip ci]"
            git push origin HEAD:"$GITHUB_REF_NAME"
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Tags
        if: steps.versioning.outputs.published == 'true'
        run: |
          pnpm changeset tag
          git push --tags

      - name: Get current version
        id: get_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

  docker-publish:
    if: needs.release.outputs.published == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [release]
    strategy:
      matrix:
        apps: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Lowercase repo name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/$REPO_LOWER/${{ matrix.apps }}" >> $GITHUB_ENV
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.apps }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Scrymechat ${{ matrix.apps }} service
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  native-android-release:
    needs: [release]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew
      - name: Build Release APK
        env:
          API_URL: http://localhost:3000
        run: cd apps/android && ./gradlew assembleRelease
      - name: Determine unique Android release tag
        id: android_tag
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/dev" ]]; then
            echo "tag=v${{ needs.release.outputs.version }}-android.${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ needs.release.outputs.version }}" >> $GITHUB_OUTPUT
          fi
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.android_tag.outputs.tag }}
          name: ${{ steps.android_tag.outputs.tag }}
          files: apps/android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/dev' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-release:
    needs: [release]
    if: needs.release.outputs.published == 'true' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
          - host: windows-latest
          - host: macos-latest
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (ubuntu only)
        if: matrix.settings.host == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Build Shared Packages
        run: |
          pnpm --filter @repo/shared build || true
          pnpm --filter @repo/api-client build || true
      - name: Sync versions to non-package files
        run: node scripts/update-version.js
      - name: Build Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: v${{ needs.release.outputs.version }}
          args: ${{ matrix.settings.host == 'windows-latest' && '--bundles msi' || '' }}
