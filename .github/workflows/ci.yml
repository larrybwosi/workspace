name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  PG_U: runner_u
  PG_P: runner_p
  PG_D_UNIT: db_unit
  PG_D_E2E: db_e2e
  RD_PORT: 6379

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/database/**'
              - 'packages/shared/**'
              - 'packages/types/**'
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'packages/api-client/**'
              - 'packages/shared/**'
              - 'packages/types/**'
            mobile:
              - 'apps/mobile/**'
              - 'packages/ui/**'
              - 'packages/api-client/**'
              - 'packages/shared/**'
              - 'packages/types/**'
            desktop:
              - 'apps/desktop/**'
              - 'packages/ui/**'
              - 'packages/api-client/**'
              - 'packages/shared/**'
              - 'packages/types/**'

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - run: pnpm run lint
      - run: pnpm run tsc

  fallow-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Run Fallow Audit
        uses: fallow-rs/fallow@v2
        with:
          command: audit
        env:
          FALLOW_PRODUCTION: "true"

  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.PG_U }}
          POSTGRES_PASSWORD: ${{ env.PG_P }}
          POSTGRES_DB: ${{ env.PG_D_UNIT }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Run Tests
        env:
          DATABASE_URL: postgresql://${{ env.PG_U }}:${{ env.PG_P }}@localhost:5432/${{ env.PG_D_UNIT }}?schema=public
          REDIS_URL: redis://localhost:${{ env.RD_PORT }}
          BETTER_AUTH_SECRET: dummy_auth_val_ci_long_enough_for_better_auth
        run: pnpm run test

  api-e2e:
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.PG_U }}
          POSTGRES_PASSWORD: ${{ env.PG_P }}
          POSTGRES_DB: ${{ env.PG_D_E2E }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Run API E2E tests
        env:
          DATABASE_URL: postgresql://${{ env.PG_U }}:${{ env.PG_P }}@localhost:5432/${{ env.PG_D_E2E }}?schema=public
          REDIS_URL: redis://localhost:${{ env.RD_PORT }}
          BETTER_AUTH_SECRET: dummy_auth_val_ci_long_enough_for_better_auth
        run: pnpm --filter api run test:e2e

  web-e2e:
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.PG_U }}
          POSTGRES_PASSWORD: ${{ env.PG_P }}
          POSTGRES_DB: ${{ env.PG_D_E2E }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build Web
        run: pnpm exec turbo build --filter web
      - name: Run Web E2E tests
        env:
          DATABASE_URL: postgresql://${{ env.PG_U }}:${{ env.PG_P }}@localhost:5432/${{ env.PG_D_E2E }}?schema=public
          EXPO_PUBLIC_API_URL: http://localhost:8081
          REDIS_URL: redis://localhost:${{ env.RD_PORT }}
          BETTER_AUTH_SECRET: dummy_auth_val_ci_long_enough_for_better_auth
          PORT: 3001
        run: pnpm --filter web run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-web
          path: apps/web/playwright-report/
          retention-days: 30

  mobile-e2e:
    needs: [changes]
    if: needs.changes.outputs.mobile == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ env.PG_U }}
          POSTGRES_PASSWORD: ${{ env.PG_P }}
          POSTGRES_DB: ${{ env.PG_D_E2E }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Mobile E2E tests
        env:
          DATABASE_URL: postgresql://${{ env.PG_U }}:${{ env.PG_P }}@localhost:5432/${{ env.PG_D_E2E }}?schema=public
          EXPO_PUBLIC_API_URL: http://localhost:8081
          REDIS_URL: redis://localhost:${{ env.RD_PORT }}
          BETTER_AUTH_SECRET: dummy_auth_val_ci_long_enough_for_better_auth
        run: pnpm --filter mobile run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-mobile
          path: apps/mobile/playwright-report/
          retention-days: 30

  mobile-verify:
    if: github.event_name == 'pull_request' && needs.changes.outputs.mobile == 'true'
    needs: [changes, lint-and-typecheck, unit-tests, api-e2e, web-e2e, mobile-e2e, fallow-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Build Shared Packages
        run: |
          pnpm --filter @repo/shared build || true
          pnpm --filter @repo/api-client build || true
      - name: Prebuild Android
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'https://api.skryme.com' }}
        run: npx expo prebuild --platform android
      - name: Assemble Debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

  desktop-verify:
    if: github.event_name == 'pull_request' && needs.changes.outputs.desktop == 'true'
    needs: [changes, lint-and-typecheck, unit-tests, api-e2e, web-e2e, mobile-e2e, fallow-audit]
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
          - host: windows-latest
          - host: macos-latest
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (ubuntu only)
        if: matrix.settings.host == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Build Shared Packages
        run: |
          pnpm --filter @repo/shared build || true
          pnpm --filter @repo/api-client build || true
      - name: Verify Compilation
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --debug
          projectPath: apps/desktop

  version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, api-e2e, web-e2e, mobile-e2e, fallow-audit]
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version:ci
          publish: npx changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [changes, lint-and-typecheck, unit-tests, api-e2e, web-e2e, mobile-e2e, version]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        apps: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Check if app changed
        id: check
        run: |
          if [ "${{ matrix.apps }}" == "api" ] && [ "${{ needs.changes.outputs.api }}" == "false" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.apps }}" == "web" ] && [ "${{ needs.changes.outputs.web }}" == "false" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Get version
        if: steps.check.outputs.changed == 'true'
        id: get_version
        run: |
          VERSION=$(node -p "require('./apps/${{ matrix.apps }}/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Lowercase repo name
        if: steps.check.outputs.changed == 'true'
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/$REPO_LOWER/${{ matrix.apps }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.apps }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: [version]
    if: needs.version.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./apps/api/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mobile-release:
    needs: [changes, version, create-release]
    if: needs.version.outputs.published == 'true' && needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Build Shared Packages
        run: |
          pnpm --filter @repo/shared build || true
          pnpm --filter @repo/api-client build || true
      - name: Prebuild Android
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'https://api.skryme.com' }}
        run: npx expo prebuild --platform android
      - name: Build Release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./apps/mobile/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          files: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-release:
    needs: [changes, version, create-release]
    if: needs.version.outputs.published == 'true' && needs.changes.outputs.desktop == 'true'
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
          - host: windows-latest
          - host: macos-latest
    runs-on: ${{ matrix.settings.host }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (ubuntu only)
        if: matrix.settings.host == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
      - name: Run Prisma Generate
        run: pnpm --filter @repo/database run db:generate
      - name: Build Shared Packages
        run: |
          pnpm --filter @repo/shared build || true
          pnpm --filter @repo/api-client build || true
      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Build Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: v${{ steps.get_version.outputs.VERSION }}
          args: ${{ matrix.settings.host == 'windows-latest' && '--bundles msi' || '' }}
