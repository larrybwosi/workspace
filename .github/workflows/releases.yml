name: Releases

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      mobile_changed: ${{ steps.filter.outputs.mobile }}
      desktop_changed: ${{ steps.filter.outputs.desktop }}
      mobile_version: ${{ steps.mobile_v.outputs.version }}
      desktop_version: ${{ steps.desktop_v.outputs.version }}
      mobile_release_exists: ${{ steps.mobile_check.outputs.exists }}
      desktop_release_exists: ${{ steps.desktop_check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
            desktop:
              - 'apps/desktop/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'

      - id: mobile_v
        run: echo "version=$(node -p "require('./apps/mobile/package.json').version")" >> $GITHUB_OUTPUT

      - id: desktop_v
        run: echo "version=$(node -p "require('./apps/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - id: mobile_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="mobile@v${{ steps.mobile_v.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - id: desktop_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="desktop@v${{ steps.desktop_v.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  mobile-release:
    needs: check
    if: needs.check.outputs.mobile_changed == 'true' && needs.check.outputs.mobile_release_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --dangerously-allow-all-builds

      - name: Generate Prisma Client
        run: pnpm --filter @repo/database run db:generate

      - name: Build Shared Packages
        run: |
          pnpm --filter @repo/shared build
          pnpm --filter @repo/api-client build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prebuild Android
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'https://api.skryme.com' }}
        run: npx expo prebuild --platform android

      - name: Build Release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Extract Changelog
        id: changelog
        run: |
          if [ -f apps/mobile/CHANGELOG.md ]; then
            awk '/^## / { if (count++) exit } { if (count) print }' apps/mobile/CHANGELOG.md > mobile_changelog.md
          else
            echo "New release for Skryme Mobile v${{ needs.check.outputs.mobile_version }}" > mobile_changelog.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile@v${{ needs.check.outputs.mobile_version }}
          name: Skryme Mobile v${{ needs.check.outputs.mobile_version }}
          body_path: mobile_changelog.md
          draft: false
          prerelease: false
          files: |
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-release:
    needs: check
    if: needs.check.outputs.desktop_changed == 'true' && needs.check.outputs.desktop_release_exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""
          - platform: ubuntu-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --dangerously-allow-all-builds

      - name: Generate Prisma Client
        run: pnpm --filter @repo/database run db:generate

      - name: Build Shared Packages
        run: |
          pnpm --filter @repo/shared build
          pnpm --filter @repo/api-client build
          pnpm --filter @repo/ui build

      - name: Extract Changelog
        id: changelog
        shell: bash
        run: |
          if [ -f apps/desktop/CHANGELOG.md ]; then
            awk '/^## / { if (count++) exit } { if (count) print }' apps/desktop/CHANGELOG.md > desktop_changelog.md
          else
            echo "New release for Skryme Desktop v${{ needs.check.outputs.desktop_version }}" > desktop_changelog.md
          fi

      - name: Build Desktop App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: desktop@v${{ needs.check.outputs.desktop_version }}
          releaseName: Skryme Desktop v${{ needs.check.outputs.desktop_version }}
          releaseBodyPath: desktop_changelog.md
          args: ${{ matrix.args }}
